apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-ttl-controller

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-ttl-controller
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-ttl-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pod-ttl-controller
subjects:
- kind: ServiceAccount
  name: pod-ttl-controller
  namespace: default
