apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-tester
  template:
    metadata:
      labels:
        app: nginx-tester
      annotations:
        pod.kubernetes.io/lifetime: "60"
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
